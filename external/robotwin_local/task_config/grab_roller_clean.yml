# grab_roller eval config (T2 gate task). Clean, in-distribution (matches collection/training).
# embodiment 必须 tron2_v5_DACH_validing(与采集/训练一致,非 aloha-agilex)。
render_freq: 0
episode_num: 50
use_seed: false
save_freq: 15
embodiment:
  - tron2_v5_DACH_validing
language_num: 1
expert_check: false   # eval ACT policy on raw seeds; skip the noisy/slow curobo expert filter
domain_randomization:
  random_background: false
  cluttered_table: false
  clean_background_rate: 1
  random_head_camera_dis: 0
  random_table_height: 0
  random_light: false
  crazy_random_light_rate: 0
camera:
  head_camera_type: D435
  wrist_camera_type: D435
  collect_head_camera: true
  collect_wrist_camera: true
data_type:
  rgb: true
  third_view: false
  depth: false
  pointcloud: false
  endpose: true
  qpos: true
  mesh_segmentation: false
  actor_segmentation: false
pcd_down_sample_num: 1024
pcd_crop: true
save_path: ./eval_data
clear_cache_freq: 1
collect_data: false
eval_video_log: true
